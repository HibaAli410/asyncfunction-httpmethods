<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css"  href="styling.css" >
</head>
<body>
    <div id="main">
    <div id="container">
        <input type="text" id="numone" name="numone" placeholder="First Value Here...">
        <input type="text" id="numtwo" name="numtwo" placeholder="second Value Here...">
    </div>
    <div id="buttondiv">
        <div>
        <button>1</button>
        <button>2</button>
        <button>3</button>
    </div>
    <div>
        <button>4</button>
        <button>5</button>
        <button>6</button>
    </div>
   <div>
        <button>7</button>
        <button>8</button>
        <button>9</button>
    </div>
    </div>
    <div id="operatorsdiv">
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
        <button>%</button>
    </div>
    <div id="result">
        <button>=</button>
    </div>
    </div>
    
    <script src="function.js"></script>
</body>
</html>
