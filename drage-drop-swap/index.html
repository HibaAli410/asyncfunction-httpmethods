<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swap Drag and drop</title>
    <script src="https://unpkg.com/swapy/dist/swapy.min.js"></script>
    <style>
      .container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 200px;
        margin: 50px auto;
      }

      .container li {
        list-style: none;
        padding: 5px;
        background-color: #f0f0f0;
        border: 1px solid #ccc;
        cursor: grab;
      }

      .container li span {
        pointer-events: painted; /* Prevents text selection during drag */
      }
      .box {
        width: 70%;
        height: auto;
        border: 1px solid #ccc;
        color: bisque;
        margin: 20px auto;
        line-height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(81, 4, 4);
      }
      .contain {
        width: 100%;
        height: 50px;
        border: 1px solid #b04d4d;
        color: bisque;
        margin: 20px auto;
        line-height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .slot[data-swapy-highlighted] {
        background-color: rgb(156, 117, 117);
      }
      .contain .containitem {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
      }
      /* sizebox style */
      .divsizing {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        width: 90%;
        height: 400px;
        border: 1px solid #ccc;
        background-color: rgb(243, 194, 159);
       
      }
      .divsizing div{
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;

      }
      .divsizing div span {
        display: block;
        text-align: center;
        color: white;
        font-size: xx-large;
        cursor: grab;
      }
      .forty {
        width: 40%;
        background-color:rgba(163, 117  , 30, 0.529);
      }
      .sixty {
        width: 30%;
        background-color:rgba(30, 129, 91, 0.529);
      }
      .ten {
        width: 10%;
        background-color:rgba(110, 106, 219, 0.529);
      }
      .ninety {
        width: 90%;
        background-color:rgba(144, 34, 122, 0.529);
      }
    </style>
  </head>

  <body>
    <!-- UL Example -->
    <ul class="container">
      <li data-swapy-slot="slot1">
        <span data-swapy-item="item1">Buy groceries </span>
      </li>
      <li data-swapy-slot="slot2">
        <span data-swapy-item="item2">Drink 2 liters of water </span>
      </li>
      <li data-swapy-slot="slot3">
        <span data-swapy-item="item3">Go for a 30-minute walk </span>
      </li>
      <li data-swapy-slot="slot4">
        <span data-swapy-item="item4">Clean the room </span>
      </li>
    </ul>
    <!-- Box Example -->
    <div class="box">
      <div class="contain" data-swapy-slot="before afternoon">
        <div class="containitem" data-swapy-handle data-swapy-item="groceries">
          Buy groceries
        </div>
      </div>
      <div class="contain" data-swapy-slot="afternoon">
        <div class="containitem" data-swapy-handle data-swapy-item="water">
          Drink 2 liters of water
        </div>
      </div>
      <div class="contain" data-swapy-slot="evening">
        <div class="containitem" data-swapy-handle data-swapy-item="clean">
          Clean the room
        </div>
      </div>
      <div class="contain" data-swapy-slot="night">
        <div class="containitem" data-swapy-handle data-swapy-item="walk">
          Go for a 30-minute walk
        </div>
      </div>
    </div>
    <!-- Re-Sizing Div Example -->
    <div class="divsizing">
      <div class="forty" data-swapy-slot="size40">
        <span data-swapy-handle data-swapy-item="star">Star</span>
      </div>
      <div class="sixty" data-swapy-slot="size60">
        <span data-swapy-handle data-swapy-item="flower">Flower</span>
      </div>
      <div class="ten" data-swapy-slot="size10">
        <span data-swapy-handle data-swapy-item="river">River</span>
      </div>
      <div class="ninety" data-swapy-slot="size90">
        <span data-swapy-item="fragnence">Fragnence</span>
      </div>
    </div>

    <script>
      // You can then use it like this
      const container = document.querySelector('.container')
      const swapy = Swapy.createSwapy(container, {
        animating: true,
        animationDuration: 300,
        animationEasing: 'ease-in-out',
        swapThreshold: 0.5
      })
      // swapy.onSwap((event) => {
      //     console.log(event.newSlotItemMap.asArray);
      //     console.log(event.newSlotItemMap.asObject);
      //     console.log(event.newSlotItemMap.asMap);
      // });
      const box = document.querySelector('.box')
      const swapy2 = Swapy.createSwapy(box, {
        AnimationEffect: 'fade',
        animationDuration: 500,
        animationEasing: 'ease-in-out',
        swapThreshold: 0.5
      })
      swapy2.onSwap(event => {
        console.log(event)
      })
      // thrird example
      const divsizing = document.querySelector('.divsizing')
      const swapy3 = Swapy.createSwapy(divsizing, {
        animation: 'dynamic'
      })
    </script>
  </body>
</html>
