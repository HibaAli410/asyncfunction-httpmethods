<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="container" class="w-full grid grid-col justify-center items-center gap-3 mt-6">    
    <input type="text" id="todo" name="todolist" onkeyup="toDo(event)" placeholder="Write Your Taks .. " class="w-96 h-12 text-center border bg-gray-100 focus:border-blue-500 border-gray-200 rounded-lg "/>
    </div>
    <script src="todos.js"></script>
</body>
</html>
